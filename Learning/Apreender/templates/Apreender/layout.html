{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="{% static 'Apreender/style.css' %}" rel="stylesheet">
        <title>{% block title %}Layout{% endblock %}</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
        <script>hljs.highlightAll();</script>
        <script>
          function renderLatex(){
            window.MathJax = {
              tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                tags: 'ams'
              },
              options: {

                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
              }
            };
          }

          document.addEventListener("DOMContentLoaded", function() {
            renderLatex();
          });
        </script>
        <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
        <script src="{% static 'Apreender/quillEditor.js' %}"></script>
        <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
      </head>
    <body class="">
        <header class="header">
    <nav class="navbar">
        <ul class="nav-links">
            {% if user.is_authenticated %}
                <!--Se estiver na pagina de exercicio link para home-->
                {% if request.path != '/' %}
                    <li class="nav-item"><a href="{% url 'index'%}" class="nav-link">Home</a></li>
                {% else %}
                    <li class="nav-item"><a href="{% url 'problem'%}" class="nav-link">Cadastrar Exercício</a></li>
                {% endif %}
               
                <li class="nav-item"><a href="{% url 'subjectsList'%}" class="nav-link">Lista de Assuntos</a></li>
                <li class="nav-item"><a href="{% url 'logout'%}" class="nav-link">Logout</a></li>
            {% else %}
                <li class="nav-item"><a href="{% url 'login'%}" class="nav-link">Login</a></li>
            {% endif %}
        </ul>
    </nav>
</header>
        {% block body%}{% endblock%}
    
</body>
</html>

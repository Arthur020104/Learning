{% extends "Apreender/layout.html" %}
{% load static %}
{% block title %}Página do Tópico{% endblock %}
{% block body %}

    <div class="question-container">
        <div class="question-statement">
            <h1>{{ topic.name }}</h1>
        </div>
        
        <div class="dropdown">
            <button class="dropdown-button">Problemas relacionados</button>
            <div class="dropdown-content">
                {% for problem in problems %}
                    <a href="{% url 'problemId' problem.id %}">
                        {{ problem.problemName|truncatechars:50 }}
                    </a>
                {% endfor %}
            </div>
        </div>

        <div class="topic-content">
            {{ fullHtml|safe }}
        </div>
    </div>


    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          tags: 'ams'
        },
        options: {

          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

{% endblock %}
